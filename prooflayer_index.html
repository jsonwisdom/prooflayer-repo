<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ProofLayer Demo</title>
  <style>
    body { font-family: Arial; background: #0b0f1a; color: #fff; text-align: center; padding: 40px; }
    input { margin: 20px; }
    .box { background: #111827; padding: 20px; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>ProofLayer Verifier</h1>
  <div class="box">
    <p>Select a file to compute SHA-256 hash:</p>
    <input type="file" id="fileInput">
    <p id="output"></p>
  </div>

<script>
document.getElementById('fileInput').addEventListener('change', async function() {
  const file = this.files[0];
  const buffer = await file.arrayBuffer();
  const hashBuffer = await crypto.subtle.digest('SHA-256', buffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  document.getElementById('output').innerText = "SHA-256: " + hashHex;
});
</script>
</body>
</html>
